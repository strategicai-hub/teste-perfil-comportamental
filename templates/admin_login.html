{% extends "_base.html" %}
{% set show_header = false %}
{% block title %}Admin — Strategic AI{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm rounded-xl border border-slate-200 bg-white shadow-sm p-6 space-y-4">
    <div class="flex items-center gap-2">
      <img src="/assets/favicon-sai.png" alt="Strategic AI" class="h-8 w-auto">
      <span class="font-semibold">Testes Comportamentais</span>
    </div>
    <h1 class="text-xl font-semibold">Acesso do administrador</h1>
    {% if error %}
      <p class="text-sm text-red-600">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/admin/login" class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="username">Usuário</label>
        <input id="username" name="username" required autofocus
               class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-teal-600 focus:outline-none focus:ring-1 focus:ring-teal-600">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="password">Senha</label>
        <input id="password" name="password" type="password" required
               class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-teal-600 focus:outline-none focus:ring-1 focus:ring-teal-600">
      </div>
      <button class="w-full rounded-md bg-teal-700 hover:bg-teal-800 px-3 py-2 text-sm font-medium text-white">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
